[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
# Pass our executable to qemu when running `cargo run`.
#-d in_asm,int,guest_errors
runner = "qemu-system-riscv64 -d guest_errors -smp 4 -m 2G --trace \"memory*\" -machine virt,aclint=on -cpu max,sstc=true -nographic -bios none -serial mon:stdio -gdb tcp::1234 -netdev user,id=orbit0,net=192.168.76.0/24,dhcpstart=192.168.76.9 -device e1000,netdev=orbit0 --trace \"e1000_*\" -kernel"

#[target.riscv64gc-unknown-orbit]
#linker = "rust-lld"

[unstable]
build-std = ["core", "alloc"]

rustflags = [
  "-Clink-arg=-Tmemory.x",

  "-Ctarget-feature=+d",
  "-Ctarget-feature=+f",

  "-Ccode-model=medium",        # RV64 medium code model (±2GiB addressing)
  "-Cforce-frame-pointers=yes",

  "-Crelocation-model=pie",            # PIE codegen for KASLR
  "-Clink-arg=-pie",
  "-Clink-arg=--no-dynamic-linker",    # Bare metal: no ld.so to consult
  "-Clink-arg=-Bsymbolic",             # Bind references locally, no interposition
  "-Clink-arg=-znotext",               # Allow text relocs (RV64 PIE emits them)
  "-Clink-arg=--pack-dyn-relocs=none", # Plain RELA, easy to walk at boot
  "-Clink-arg=--export-dynamic",       # Populate dynsym (paired with linker script)
]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
